[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pymath"
version = "0.1.0"
description = "A Python library for mathematical utilities including vectors, statistics, geometry, and number theory"
dependencies = [
    "pytest",
]

[tool.setuptools]
package-dir = {"" = "src"}
py-modules = ["mathutils"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]