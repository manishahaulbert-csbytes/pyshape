[build-system]
requires = ["setuptools>=61.0", "setuptools-scm"]
build-backend = "setuptools.build_meta"

[project]
name = "pymath"
version = "0.1.0"
description = "Mathematical utility functions for the PyShape monorepo"
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.setuptools]
# This explicitly tells setuptools where the 'real' code lives
package-dir = {"" = "src"}
packages = {find = {where = ["src"]}}

[tool.pytest.ini_options]
# Crucial: This allows you to run 'pytest' from inside the package folder
# or from the root and still have imports resolve correctly.
pythonpath = ["src"]
testpaths = ["tests"]
addopts = "--import-mode=importlib"