trigger:
- master
- main
- develop
- feature/*

pr:
- master
- main
- develop

pool:
  vmImage: ubuntu-latest

strategy:
  matrix:
    Python314:
      python.version: '3.14'
    Python311:
      python.version: '3.11'

variables:
  PYTHONPATH: '$(System.DefaultWorkingDirectory)'
  pyshapeProjectKey: 'pyshape_pyshape'
  pymathProjectKey: 'pyshape_pymath'

steps:
- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
  displayName: 'Use Python $(python.version)'

# Install dependencies (all jobs)
- script: |
    python -m pip install --upgrade pip
    pip install -r requirements.txt
    pip install -e .
  displayName: 'Install monorepo dependencies'

- script: |
    cd packages/pyshape && pip install -e .
    cd ../pymath && pip install -e .
    cd ../..
  displayName: 'Install package dependencies'

# Run tests with coverage once (all packages)
- script: |
    echo "Running tests for PyShape Monorepo..."
    pytest packages/*/tests/ \
      --doctest-modules \
      --junitxml=test-results.xml \
      --cov=packages \
      --cov-report=xml \
      --cov-report=term-missing \
      --verbose
  displayName: 'Run tests with coverage for all packages'

# Optional: per-package tests (for detail)
- script: |
    echo "Testing PyShape package..."
    cd packages/pyshape
    pytest tests/test_shapes.py -v --junitxml=../../pyshape-test-results.xml
    cd ../..
  displayName: 'Test PyShape package'
  continueOnError: true

- script: |
    echo "Testing PyMath package..."
    cd packages/pymath
    pytest tests/test_mathutils.py -v --junitxml=../../pymath-test-results.xml
    cd ../..
  displayName: 'Test PyMath package'
  continueOnError: true

# Optional: demos
- script: |
    echo "Running PyMath demo..."
    cd packages/pymath/src && python main.py
    echo "Running PyShape demo..."
    cd ../../pyshape/src && python main.py
    cd ../../..
  displayName: 'Run package demos'
  continueOnError: true

# --- SonarQube: Project 1 (pyshape) ---
- task: SonarQubePrepare@8
  condition: eq(variables['python.version'], '3.11')
  inputs:
    SonarQube: '20261sonarqubeserver'
    scannerMode: 'CLI'
    cliScannerVersion: '8.0.1.6346'
    configMode: 'manual'
    cliProjectKey: '$(pyshapeProjectKey)'
    cliProjectName: 'PyShape / pyshape'
    extraProperties: |
      sonar.scanner.skipJreProvisioning=true
      sonar.python.version=$(python.version)
      sonar.projectBaseDir=$(System.DefaultWorkingDirectory)/packages/pyshape
      sonar.sources=src
      sonar.tests=tests
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/test-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
      sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/__pycache__/**
      sonar.exclusions=**/__pycache__/**,**/.*,scripts/**

- task: SonarQubeAnalyze@8
  condition: eq(variables['python.version'], '3.11')
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'
  displayName: 'Analyze SonarQube project: pyshape'

# --- SonarQube: Project 2 (pymath) ---
- task: SonarQubePrepare@8
  condition: eq(variables['python.version'], '3.11')
  inputs:
    SonarQube: '20261sonarqubeserver'
    scannerMode: 'CLI'
    cliScannerVersion: '8.0.1.6346'
    configMode: 'manual'
    cliProjectKey: '$(pymathProjectKey)'
    cliProjectName: 'PyShape / pymath'
    extraProperties: |
      sonar.scanner.skipJreProvisioning=true
      sonar.python.version=$(python.version)
      sonar.projectBaseDir=$(System.DefaultWorkingDirectory)/packages/pymath
      sonar.sources=src
      sonar.tests=tests
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/test-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/coverage.xml
      sonar.coverage.exclusions=**/tests/**,**/test_*.py,**/__pycache__/**
      sonar.exclusions=**/__pycache__/**,**/.*,scripts/**

- task: SonarQubeAnalyze@8
  condition: eq(variables['python.version'], '3.11')
  inputs:
    jdkversion: 'JAVA_HOME_17_X64'
  displayName: 'Analyze SonarQube project: pymath'

# Publish tests (all jobs)
- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: '**/test-results.xml'
    testRunTitle: 'Python $(python.version) - Monorepo Tests'
  displayName: 'Publish test results'

# Publish coverage (once, from 3.11)
- task: PublishCodeCoverageResults@2
  condition: eq(variables['python.version'], '3.11')
  inputs:
    summaryFileLocation: '$(System.DefaultWorkingDirectory)/coverage.xml'
    codecoverageTool: 'Cobertura'
  displayName: 'Publish coverage results'