trigger:
- master
- main
- develop
- feature/*

pr:
- master
- main
- develop

pool:
  vmImage: ubuntu-latest

strategy:
  matrix:
    Python311:
      python.version: '3.11'
    Python314:
      python.version: '3.14'

variables:
  pyshapeKey: 'pyshape_pyshape'
  pymathKey: 'manishahaulbert-csbytes_python_pymath'

steps:
- checkout: self
  fetchDepth: 0
  lfs: true
  displayName: 'Checkout Source Code'

- task: UsePythonVersion@0
  inputs:
    versionSpec: '$(python.version)'
  displayName: 'Use Python $(python.version)'

# 1. Detect Changes
- script: |
    # Check for changes in specific directories
    CHANGED_FILES=$(git diff --name-only HEAD~1)
    echo "Files changed: $CHANGED_FILES"
    
    if echo "$CHANGED_FILES" | grep -q "packages/pyshape"; then
      echo "##vso[task.setvariable variable=runPyshape;isOutput=true]true"
      echo "Detected changes in PyShape"
    fi
    
    if echo "$CHANGED_FILES" | grep -q "packages/pymath"; then
      echo "##vso[task.setvariable variable=runPymath;isOutput=true]true"
      echo "Detected changes in PyMath"
    fi
  name: DetermineChanges
  displayName: 'Detect Changed Packages'

# 2. Install Dependencies (Global)
- script: |
    python -m pip install --upgrade pip
    pip install pytest pytest-cov
  displayName: 'Install Base Tools'

# --- PyShape Block ---
- script: |
    pip install -e ./packages/pyshape
    export PYTHONPATH="$(System.DefaultWorkingDirectory)/packages/pyshape/src"
    pytest packages/pyshape/tests \
      --junitxml=pyshape-results.xml \
      --cov=packages/pyshape/src \
      --cov-report=xml:pyshape-coverage.xml
  displayName: 'Run PyShape Tests'
  condition: eq(variables['DetermineChanges.runPyshape'], 'true')

- task: SonarQubePrepare@8
  condition: and(eq(variables['python.version'], '3.11'), eq(variables['DetermineChanges.runPyshape'], 'true'))
  inputs:
    SonarQube: '20261sonarqubeserver'
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: '$(pyshapeKey)'
    extraProperties: |
      sonar.projectBaseDir=packages/pyshape
      sonar.sources=src
      sonar.tests=tests
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/pyshape-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/pyshape-coverage.xml

# --- PyMath Block ---
- script: |
    pip install -e ./packages/pymath
    export PYTHONPATH="$(System.DefaultWorkingDirectory)/packages/pymath/src"
    pytest packages/pymath/tests \
      --junitxml=pymath-results.xml \
      --cov=packages/pymath/src \
      --cov-report=xml:pymath-coverage.xml
  displayName: 'Run PyMath Tests'
  condition: eq(variables['DetermineChanges.runPymath'], 'true')

- task: SonarQubePrepare@8
  condition: and(eq(variables['python.version'], '3.11'), eq(variables['DetermineChanges.runPymath'], 'true'))
  inputs:
    SonarQube: '20261sonarqubeserver'
    scannerMode: 'CLI'
    configMode: 'manual'
    cliProjectKey: '$(pymathKey)'
    extraProperties: |
      sonar.projectBaseDir=packages/pymath
      sonar.sources=src
      sonar.tests=tests
      sonar.python.xunit.reportPath=$(System.DefaultWorkingDirectory)/pymath-results.xml
      sonar.python.coverage.reportPaths=$(System.DefaultWorkingDirectory)/pymath-coverage.xml

# 3. Analyze & Publish (Combined)
- task: SonarQubeAnalyze@8
  condition: eq(variables['python.version'], '3.11')
  displayName: 'Run Sonar Analysis'

- task: PublishTestResults@2
  condition: succeededOrFailed()
  inputs:
    testResultsFiles: '*-results.xml'