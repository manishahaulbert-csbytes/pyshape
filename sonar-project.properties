sonar.projectKey=pyshape-monorepo
sonar.projectName=PyShape Monorepo
sonar.projectVersion=1.0.0
sonar.token=sqa_20f7ceb8c5fbcd87f5b63ee32247db3296590fc4
sonar.organization=manisha-csorg

# Monorepo - treat as single project with multiple source directories
sonar.sources=packages/pyshape/src,packages/pymath/src
sonar.tests=packages/pyshape/tests,packages/pymath/tests

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/*.xml,**.xhtml,**/.*,scripts/**,.venv/**,**/.pytest_cache/**

# Test inclusions
sonar.test.inclusions=**/test_*.py
sonar.sourceEncoding=UTF-8

# Coverage configuration
sonar.python.coverage.reportPaths=coverage.xml
sonar.test.coverage.exclusions=**/tests/**,**/__init__.py,**/test_*.py

# Python language settings  
sonar.python.version=3.11

# Architecture analysis
sonar.architecture.enabled=true







